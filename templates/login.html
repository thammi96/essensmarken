<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmeldung - Verzehrkarten Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.08), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(29, 78, 216, 0.05), transparent 40%),
                        #f9fafb;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <div class="mx-auto h-12 w-12 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 flex items-center justify-center text-white font-extrabold text-xl shadow-lg">
                V
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Studio-Anmeldung
            </h2>
            <p class="mt-2 text-center text-sm text-gray-500">
                Bitte logge dich ein, um Wertmarken zu generieren.
            </p>
        </div>

        <div class="glass-card rounded-2xl p-8 shadow-2xl">
            <!-- Flask Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-4 p-4 rounded-xl text-sm border bg-red-50 border-red-200 text-red-700">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form class="space-y-6" action="/login" method="POST">
                <div>
                    <label for="username" class="block text-sm font-semibold text-gray-700">Benutzername</label>
                    <input id="username" name="username" type="text" required 
                        class="mt-1 block w-full rounded-xl border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-3 border transition-colors bg-white/50"
                        placeholder="admin">
                </div>
                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700">Passwort</label>
                    <input id="password" name="password" type="password" required 
                        class="mt-1 block w-full rounded-xl border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-3 border transition-colors bg-white/50"
                        placeholder="••••••••">
                </div>

                <div>
                    <button type="submit" 
                        class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-indigo-100 transition-all flex items-center justify-center">
                        Anmelden
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
